name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned, see rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Formatting and lints are hard gates (spec 09 §5).
      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # studio-core tests are hermetic: they use StubRunner or portable
      # commands (git, sh, echo) and temp dirs — no Omarchy needed.
      - name: test
        run: cargo test --workspace

      # Guardrail: only the omarchy adapter may name Omarchy paths (spec 02 §6).
      - name: adapter boundary
        run: |
          leak=$(grep -rn "local/share/omarchy" crates/studio-core/src \
            --include='*.rs' | grep -v 'src/omarchy' || true)
          if [ -n "$leak" ]; then
            echo "Omarchy path referenced outside the adapter:" >&2
            echo "$leak" >&2
            exit 1
          fi

      # `include_str!` can reach outside the crate and still build here, then
      # ship a crate that can't compile — the theme catalog did exactly that.
      # Packaging with verification builds studio-core from its own tarball.
      - name: studio-core packages for crates.io
        run: cargo package -p studio-core --locked

  e2e:
    name: tmux journeys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned, see rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      # Drives the real binary in a pty against a fixture Omarchy — no
      # Omarchy, Hyprland or Wayland needed. Catches what unit tests can't:
      # the TUI failing to start, or the rail going deaf.
      - name: TUI journeys
        run: |
          cargo build
          ./tools/e2e.sh ./target/debug/omarchy-studio
