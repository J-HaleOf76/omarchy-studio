# Tag builds: push a `v*` tag and this publishes a GitHub release carrying
# the binary the self-updater (modules/update.rs) looks for. The asset name
# must stay `omarchy-studio-linux-x86_64` — update::ASSET matches on it.
#
# Manual backfill for an existing tag whose release has no asset:
#   gh workflow run release.yml -f tag=v0.8.6
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to build and attach the binary to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build + publish binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      # The binary reports CARGO_PKG_VERSION (TUI header, --version, and the
      # self-updater's CURRENT). A tag that doesn't match Cargo.toml ships a
      # binary that lies about itself and self-updates forever — refuse it.
      - name: Check tag matches crate version
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          crate="v$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "$tag" != "$crate" ]; then
            echo "tag $tag != workspace version $crate — bump Cargo.toml first" >&2
            exit 1
          fi

      - name: Install Rust (pinned, matches CI)
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage asset
        run: cp target/release/omarchy-studio omarchy-studio-linux-x86_64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: omarchy-studio-linux-x86_64
          generate_release_notes: true
