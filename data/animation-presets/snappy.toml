name = "Snappy"
description = "Fast and direct — windows feel wired to your fingers"

[beziers]
snap = [0.2, 0.9, 0.1, 1.0]

[animations]
global     = { on = true, speed = 6.0, bezier = "default" }
windows    = { on = true, speed = 2.5, bezier = "snap", style = "popin 92%" }
windowsOut = { on = true, speed = 1.2, bezier = "snap", style = "popin 92%" }
border     = { on = true, speed = 3.0, bezier = "snap" }
fade       = { on = true, speed = 1.5, bezier = "snap" }
layers     = { on = true, speed = 2.0, bezier = "snap", style = "fade" }
workspaces = { on = true, speed = 2.5, bezier = "snap", style = "slide" }
