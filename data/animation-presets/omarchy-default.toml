# Extracted verbatim from omarchy 3.8.2 default/hypr/looknfeel.conf.
# Applying this preset == "reset animations to stock".
name = "Omarchy Default"
description = "The stock Omarchy feel — smooth ease-out everywhere"

[beziers]
easeOutQuint = [0.23, 1.0, 0.32, 1.0]
easeInOutCubic = [0.65, 0.05, 0.36, 1.0]
linear = [0.0, 0.0, 1.0, 1.0]
almostLinear = [0.5, 0.5, 0.75, 1.0]
quick = [0.15, 0.0, 0.1, 1.0]

[animations]
global        = { on = true, speed = 10.0, bezier = "default" }
border        = { on = true, speed = 5.39, bezier = "easeOutQuint" }
windows       = { on = true, speed = 3.79, bezier = "easeOutQuint" }
windowsIn     = { on = true, speed = 4.1,  bezier = "easeOutQuint", style = "popin 87%" }
windowsOut    = { on = true, speed = 1.49, bezier = "linear",       style = "popin 87%" }
fadeIn        = { on = true, speed = 1.73, bezier = "almostLinear" }
fadeOut       = { on = true, speed = 1.46, bezier = "almostLinear" }
fade          = { on = true, speed = 3.03, bezier = "quick" }
layers        = { on = true, speed = 3.81, bezier = "easeOutQuint" }
layersIn      = { on = true, speed = 4.0,  bezier = "easeOutQuint", style = "fade" }
layersOut     = { on = true, speed = 1.5,  bezier = "linear",       style = "fade" }
fadeLayersIn  = { on = true, speed = 1.79, bezier = "almostLinear" }
fadeLayersOut = { on = true, speed = 1.39, bezier = "almostLinear" }
workspaces    = { on = true, speed = 1.94, bezier = "almostLinear", style = "fade" }
